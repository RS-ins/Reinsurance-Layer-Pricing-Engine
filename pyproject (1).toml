[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "reinsure-pricing"
version = "0.1.0"
description = "Monte Carlo engine for pricing Excess-of-Loss and Stop-Loss reinsurance layers"
readme = "README.md"
license = { text = "MIT" }
authors = [
    { name = "RS-ins" }
]
requires-python = ">=3.10"
keywords = ["reinsurance", "actuarial", "monte-carlo", "pricing", "excess-of-loss", "stop-loss"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Mathematics",
]
dependencies = [
    "numpy>=1.26",
    "scipy>=1.12",
    "pandas>=2.0",
    "matplotlib>=3.8",
    "streamlit>=1.35",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
]
notebooks = [
    "jupyter>=1.0",
    "ipykernel>=6.0",
]

[project.urls]
Homepage = "https://github.com/RS-ins/Reinsurance-Layer-Pricing-Engine"
Repository = "https://github.com/RS-ins/Reinsurance-Layer-Pricing-Engine"
Issues = "https://github.com/RS-ins/Reinsurance-Layer-Pricing-Engine/issues"

# Tell setuptools where to find the package source
[tool.setuptools.packages.find]
where = ["src"]

# pytest configuration
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=reinsure_pricing --cov-report=term-missing"

# Ruff linter/formatter configuration
[tool.ruff]
line-length = 88
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]   # pycodestyle, pyflakes, isort

# Mypy type checker configuration
[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
mypy_path = "src"
